<ul id="deltagere">
    <li>Henter data...</li>
</ul>

<p>
    <input id="name" placeholder="Navn på deltager" type="text">
    <button id="add">Legg inn ny deltager</button>
</p>

<script type="module">
    async function hentData() {
        const response = await fetch('/deltagere-json');
        const data = await response.json();
        let list = document.getElementById('deltagere');
        list.innerHTML = '';
        data.forEach(row => {
            let li = document.createElement('li');
            li.textContent = row.name;
            list.appendChild(li);
        });
    }

    async function sendData(userName) {
        const data = { name: userName };
        await fetch('/deltagere', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
    }

    function getUserName() {
        return document.getElementById('name').value;
    }

    document.getElementById('add')
        .addEventListener('click', async () => {
            const userName = getUserName();
            await sendData(userName);
            await hentData();                          // Oppdaterer listen
            document.getElementById('name').value = ''; // Tømmer input-feltet
        });

    hentData(); // Henter listen når siden lastes
</script>
